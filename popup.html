<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Eclyzer Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="popup-header">
      <div class="header-brand">
        <img src="icons/icon-48.png" alt="Eclyzer" class="header-logo" width="36" height="36">
        <div class="header-text">
          <h1 class="header-title">Eclyzer Hub</h1>
          <p class="header-subtitle">Quick access to Eclyzer tools</p>
        </div>
      </div>
    </header>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Dynamic content rendered by popup.js -->
    <main id="popup-content" class="popup-body"></main>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-text">Eclyzer Hub v1.5.0</span>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
